# .github/workflows/deploy.yml
#
# GeoVision QA — CI/CD Pipeline
#
# Triggers on every push to `main`.
#   1. test    — lint + import checks
#   2. build   — build Docker image, push to GCP Artifact Registry
#   3. deploy  — SSH into the GCP VM, pull new image, restart container

name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev
  IMAGE_NAME: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/geovision/geovision-api

jobs:
  # ── Job 1: Lint & smoke test ──────────────────────────────────────────────
  test:
    name: Lint & Import Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install lint deps
        run: pip install ruff
      - name: Ruff lint
        run: ruff check src/api/
      - name: Check for syntax errors
        run: python -m py_compile src/api/main.py src/api/inference.py src/api/rag_context.py src/api/observability.py src/api/model_loader.py

  # ── Job 2: Build & push Docker image ─────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet
      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:cache
          cache-to:   type=registry,ref=${{ env.IMAGE_NAME }}:cache,mode=max
      - name: Image digest
        run: echo "Pushed ${{ env.IMAGE_NAME }}:latest"

  # ── Job 3: Deploy to GCP VM ───────────────────────────────────────────────
  deploy:
    name: Deploy to GCP VM
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
      - name: Deploy via gcloud SSH
        run: |
          gcloud compute ssh ${{ secrets.API_VM_NAME }} \
            --zone=${{ secrets.API_VM_ZONE }} \
            --tunnel-through-iap \
            --command='
              set -e

              IMAGE="${{ env.IMAGE_NAME }}:latest"
              CONTAINER="geovision-api"
              REGISTRY="${{ env.REGISTRY }}"

              echo "→ Authenticating Docker to Artifact Registry"
              # Use the VM service-account access token to log in to the registry.
              # This is more reliable over non-interactive SSH than the cred helper.
              ACCESS_TOKEN=$(curl -s -H "Metadata-Flavor: Google" \
                "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token" \
                | python3 -c "import sys, json; print(json.load(sys.stdin)['"'"'access_token'"'"'])")
              echo "$ACCESS_TOKEN" | sudo docker login -u oauth2accesstoken --password-stdin "https://$REGISTRY"

              echo "→ Pulling new image: $IMAGE"
              sudo docker pull "$IMAGE"

              echo "→ Stopping old container (if running)"
              sudo docker stop "$CONTAINER" 2>/dev/null || true
              sudo docker rm   "$CONTAINER" 2>/dev/null || true

              echo "→ Starting new container"
              sudo docker run -d \
                --name "$CONTAINER" \
                --restart unless-stopped \
                -p 8080:8080 \
                -e GCS_BUCKET=geovision-data \
                -e LANGFUSE_PUBLIC_KEY="${{ secrets.LANGFUSE_PUBLIC_KEY }}" \
                -e LANGFUSE_SECRET_KEY="${{ secrets.LANGFUSE_SECRET_KEY }}" \
                -e LANGFUSE_HOST="${{ secrets.LANGFUSE_HOST }}" \
                "$IMAGE"

              echo "→ Waiting for health check ..."
              sleep 20
              sudo docker ps
            '
      - name: Notify deploy success
        run: |
          echo "Deployed ${{ env.IMAGE_NAME }}:latest"
